name: Update profile stats

on:
  repository_dispatch:
    types: [profile-metrics-updated]
  schedule:
    # Late fallback: the kaya-site workflow normally dispatches this at 06:30 UTC.
    - cron: "40 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-data-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Refresh SVG stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REQUIRE_GITHUB_STATS: "1"
          PROFILE_METRICS_URL: https://kayahickin.com/api/profile-metrics
          PROFILE_SITE_MAX_AGE_HOURS: "48"
          REFRESH_TRIGGER: ${{ github.event_name }}
          SKIP_IF_REFRESHED_TODAY: ${{ github.event_name == 'schedule' }}
          WRITE_REFRESH_STATE: "1"
        run: python update_readme.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg loc_cache.json profile_refresh_state.json
          git diff --cached --quiet || (git commit -m "chore: refresh profile stats" && git push)
